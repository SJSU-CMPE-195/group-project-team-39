services:
  # Python vision service — creates shared memory, publishes puck coordinates
  pysvc:
    image: yathien/pysvc:dev
    restart: unless-stopped
    network_mode: "host"
    ipc: host
    privileged: true
    environment:
      - HEADLESS=1
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - /run/udev:/run/udev:ro

  # C++ gantry controller — reads shared memory, drives motors
  cppsvc:
    image: yathien/cppsvc:dev
    restart: unless-stopped
    network_mode: "host"
    ipc: host
    privileged: true
    depends_on:
      - pysvc

  # M4 firmware loader — run separately when needed: docker compose up m4loader
  m4loader:
    image: yathien/m4loader:dev
    restart: "no"
    privileged: true
    profiles:
      - m4
    volumes:
      - /sys:/sys
      - /var/m4fw:/host-firmware
      - /run/udev:/run/udev:ro
